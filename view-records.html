<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Quiz Records</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    button { padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>All Student Records</h1>
  <button onclick="loadRecords()">Refresh Records</button>
  <div id="records"></div>

  <script>
    async function loadRecords() {
      try {
        const res = await fetch('/records');
        const data = await res.json();
        
        let html = `<p><strong>Total submissions: ${data.length}</strong></p>`;
        html += `<table><tr><th>Time</th><th>Name</th><th>Score</th><th>Q1 Answer</th><th>Q2 Answer</th></tr>`;
        
        data.reverse().forEach(r => {
          html += `<tr>
            <td>${new Date(r.timestamp).toLocaleString()}</td>
            <td>${r.name}</td>
            <td>${r.score}</td>
            <td>${r.q1}</td>
            <td>${r.q2}</td>
          </tr>`;
        });
        html += `</table>`;
        document.getElementById('records').innerHTML = html;
      } catch(e) {
        document.getElementById('records').innerHTML = "<p>Error loading records or no data yet.</p>";
      }
    }

    // Load automatically when page opens
    window.onload = loadRecords;
  </script>
</body>
</html>
